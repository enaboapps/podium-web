<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#0a0a0a">
    <title>Podium Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #0a0a0a;
        --surface: #131313;
        --foreground: #f5f5f5;
        --muted: #a3a3a3;
        --border: #262626;
        --primary: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--background);
        color: var(--foreground);
      }

      .card {
        width: 100%;
        max-width: 420px;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        text-align: center;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 16px;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Podium is offline</h1>
      <p>The app could not open a cached page for this route. Try your library if you have already synced content on this device.</p>
      <a href="/library">Open library</a>
    </div>
  </body>
</html>
